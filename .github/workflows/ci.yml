name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci && npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test
        env:
          NODE_ENV: test

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Coolify deploy
        run: |
          if [ -z "$WEBHOOK_URL" ] || [ -z "$TOKEN" ]; then
            echo "Coolify secrets not configured, skipping deploy trigger"
            exit 0
          fi
          curl -s -X GET "$WEBHOOK_URL" -H "Authorization: Bearer $TOKEN" --fail
        env:
          WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_BACKEND }}
          TOKEN: ${{ secrets.COOLIFY_TOKEN }}
